<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapDollar | Career Deep Dive</title>
    
    <meta name="description" content="Check out this high-ROI career breakdown on SnapDollar.">
    <meta property="og:title" content="SnapDollar | Career Intelligence">
    <meta property="og:description" content="Check out this high-ROI career breakdown.">
    <meta property="og:image" content="https://snapdollar.web.app/logo.png">
    <meta property="og:type" content="website">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg-obsidian: #050505;
            --card-bg: #111111;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --neon-emerald: #00ff88;
            --emerald-glow: rgba(0, 255, 136, 0.15);
        }

        body { 
            background-color: var(--bg-obsidian); 
            color: var(--text-main); 
            font-family: 'Inter', system-ui, sans-serif; 
            margin: 0; 
            padding: 0; 
            padding-bottom: 100px; /* Space for the sticky bottom bar */
        }
        h1, h2, h3, .logo { font-family: 'Space Grotesk', sans-serif; }

        .navbar { padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .brand-container { display: flex; align-items: center; gap: 0.75rem; text-decoration: none; }
        .custom-logo { height: 36px; width: auto; border-radius: 8px; }
        .logo { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; color: var(--text-main); }
        .logo span { color: var(--neon-emerald); }
        .back-btn { color: var(--text-muted); text-decoration: none; display: flex; align-items: center; gap: 0.5rem; font-weight: 500; transition: color 0.3s; cursor: pointer; }
        .back-btn:hover { color: var(--neon-emerald); }

        .container { max-width: 900px; margin: 0 auto; padding: 4rem 2rem; }
        .loading { text-align: center; color: var(--neon-emerald); font-size: 1.2rem; margin-top: 4rem; }
        
        /* Dashboard Layout */
        .dashboard { display: none; } 
        .header-section { margin-bottom: 3rem; text-align: center; }
        .icon-wrapper { background: rgba(0, 255, 136, 0.1); color: var(--neon-emerald); padding: 1.2rem; border-radius: 12px; display: inline-flex; margin-bottom: 1.5rem; }
        .header-section h1 { font-size: 3rem; margin: 0 0 0.5rem 0; letter-spacing: -1px; }
        .header-section .tagline { color: var(--neon-emerald); font-weight: 600; font-size: 1.2rem; margin-bottom: 1rem; }
        .header-section .overview { color: var(--text-muted); font-size: 1.1rem; line-height: 1.6; max-width: 700px; margin: 0 auto; }

        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 3rem; }
        .metric-card { background: var(--card-bg); padding: 1.5rem; border-radius: 12px; border: 1px solid #222; text-align: center; }
        .metric-card h3 { color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; margin: 0 0 0.5rem 0; }
        .metric-card .value { font-size: 1.4rem; font-weight: 700; color: #fff; }

        .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 3rem; }
        @media (max-width: 768px) { .content-grid { grid-template-columns: 1fr; } }
        
        .info-panel { background: var(--card-bg); padding: 2rem; border-radius: 12px; border: 1px solid #222; }
        .info-panel h2 { margin-top: 0; font-size: 1.4rem; border-bottom: 1px solid #333; padding-bottom: 0.8rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem; }
        
        /* Typography Upgrades for Mobile Scanning */
        .ai-content { color: var(--text-muted); line-height: 1.8; font-size: 1rem; }
        .ai-content strong { color: #fff; }
        
        /* Sticky Related Careers Bar */
        .related-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(0, 255, 136, 0.2);
            padding: 1rem 2rem;
            display: none; /* Hidden until data loads */
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            z-index: 1000;
            box-sizing: border-box;
        }

        .related-label {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .related-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .related-btn {
            background: transparent;
            border: 1px solid var(--neon-emerald);
            color: var(--neon-emerald);
            padding: 0.7rem 1.2rem;
            border-radius: 8px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .related-btn:hover {
            background: var(--neon-emerald);
            color: #000;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px var(--emerald-glow);
        }

        @media (max-width: 768px) {
            .related-bar {
                flex-direction: column;
                gap: 0.8rem;
                padding: 1rem;
            }
            .related-buttons {
                width: 100%;
            }
            .related-btn {
                flex: 1;
                justify-content: center;
                text-align: center;
                padding: 0.8rem;
                font-size: 0.85rem;
            }
        }
    </script>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="brand-container">
            <img src="logo.png" alt="SnapDollar Logo" class="custom-logo">
            <div class="logo">Snap<span>Dollar</span></div>
        </a>
        <button id="share-btn" class="back-btn" style="background: none; border: none; font-size: 1rem; cursor: pointer; padding: 0; font-family: inherit;">
            <i data-lucide="share-2" style="width: 18px;"></i> Share
        </button>
    </nav>


    <div class="container">
        <div id="loading-state" class="loading">Booting up the database...</div>

        <div id="dashboard" class="dashboard">
            <div class="header-section">
                <div class="icon-wrapper"><i id="job-icon" data-lucide="briefcase" style="width: 32px; height: 32px;"></i></div>
                <h1 id="job-title">Loading...</h1>
                <p id="job-overview" class="overview">Loading...</p>
                <div style="margin-top: 1.5rem; color: var(--text-muted); font-size: 0.9rem;">
                    <i data-lucide="clock" style="width: 14px; display: inline-block; vertical-align: middle;"></i> 
                    Last Updated: <span id="last-updated">--</span>
                </div>
            </div>

            <div class="metrics-grid">
                <div class="metric-card">
                    <h3>ROI Rating</h3>
                    <div id="roi-rating" class="value" style="color: var(--neon-emerald);">--</div>
                </div>
                <div class="metric-card">
                    <h3>Salary Range</h3>
                    <div id="salary-range" class="value">--</div>
                </div>
                <div class="metric-card">
                    <h3>Sector</h3>
                    <div id="job-sector" class="value" style="text-transform: capitalize;">--</div>
                </div>
            </div>

            <div id="dynamic-content-grid" class="content-grid"></div>
        </div>
    </div>

    <div id="related-careers-bar" class="related-bar">
        <span class="related-label">Explore Related:</span>
        <div id="related-buttons" class="related-buttons">
            </div>
    </div>

    <script>
        lucide.createIcons();

        // Upgraded Markdown parser: more breathing room, colored bullet points
        function formatMarkdown(text) {
            if(!text) return '';
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n\s*-\s/g, '<br><br><span style="color: var(--neon-emerald); margin-right: 5px;">•</span> ')
                .replace(/\n\s*\*\s/g, '<br><br><span style="color: var(--neon-emerald); margin-right: 5px;">•</span> ')
                .replace(/\n/g, '<br><br>'); // Double line break for easier scanning
        }

        async function loadJobDetails() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const jobId = urlParams.get('id');

                if (!jobId) throw new Error("No job ID provided");

                const response = await fetch(`data/${jobId}.json`);
                if (!response.ok) throw new Error("Database not found");
                
                const data = await response.json();

                // 1. Inject the Visible Header Data
                document.title = `SnapDollar | ${data.title}`;
                document.getElementById('job-title').innerText = data.title;
                document.getElementById('job-overview').innerText = data.description;
                document.getElementById('last-updated').innerText = data.lastUpdated || "Recently Updated";
                document.getElementById('job-icon').setAttribute('data-lucide', data.icon || 'briefcase');
                
                // 2. Inject the Invisible SEO Payload
                if (data.seoMetaDescription) {
                    const metaDesc = document.querySelector('meta[name="description"]');
                    if (metaDesc) metaDesc.content = data.seoMetaDescription;
                }

                if (data.seoSchema) {
                    const schemaScript = document.createElement('script');
                    schemaScript.type = "application/ld+json";
                    schemaScript.textContent = JSON.stringify(data.seoSchema);
                    document.head.appendChild(schemaScript);
                }

                // 3. Inject Top Metrics
                document.getElementById('roi-rating').innerText = data.roiRating;
                document.getElementById('salary-range').innerText = data.salaryRange;
                document.getElementById('job-sector').innerText = data.sector;
                
                // 4. Dynamically Generate the Content Grid
                const contentGrid = document.getElementById('dynamic-content-grid');
                contentGrid.innerHTML = ''; 

                if (data.sections) {
                    data.sections.forEach(section => {
                        contentGrid.innerHTML += `
                            <div style="grid-column: 1 / -1; margin-top: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.5rem;">
                                <h2 style="color: var(--neon-emerald); font-size: 1.5rem; margin: 0; font-family: 'Space Grotesk', sans-serif;">${section.title}</h2>
                            </div>
                        `;
                        
                        section.cards.forEach(card => {
                            const fullWidthCards = ["The Execution Plan", "A Day in the Life", "What You Actually Do"];
                            const isFullWidth = fullWidthCards.includes(card.title) ? "grid-column: 1 / -1;" : "";
                            
                            contentGrid.innerHTML += `
                                <div class="info-panel" style="${isFullWidth}">
                                    <h2>${card.title}</h2>
                                    <p style="font-style: italic; color: #5a6b82; font-size: 0.95rem; margin-top: -1.2rem; margin-bottom: 1.5rem;">"${card.subconsciousQuestion}"</p>
                                    <div class="ai-content">
                                        ${formatMarkdown(card.content)}
                                    </div>
                                </div>
                            `;
                        });
                    });
                } else {
                     contentGrid.innerHTML = `<div class="loading" style="grid-column: 1 / -1;">Legacy data format detected. AI will upgrade this file soon.</div>`;
                }

                document.getElementById('loading-state').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                lucide.createIcons();

                // 5. THE MAGIC LOOP: Fetch Related Careers dynamically
                fetchRelatedCareers(data.sector, jobId);

            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('loading-state').innerHTML = `
                    <div style="font-size: 4rem; margin-bottom: 1rem;">🚧</div>
                    <h2 style="color: #fff;">Database Under Construction</h2>
                    <p style="color: var(--text-muted); font-size: 1rem;">We are still gathering the intelligence for this specific career. Check back soon.</p>
                `;
            }
        }

        async function fetchRelatedCareers(sector, currentJobId) {
            try {
                // Fetch the category summary file (e.g. data/medical.json)
                const res = await fetch(`data/${sector}.json`);
                if (!res.ok) return; // If file doesn't exist yet, silently fail

                const sectorData = await res.json();
                
                // Remove the currently viewed job so we don't recommend it
                const otherCareers = sectorData.careers.filter(career => career.id !== currentJobId);

                if (otherCareers.length > 0) {
                    // Shuffle the array randomly
                    const shuffled = otherCareers.sort(() => 0.5 - Math.random());
                    
                    // Pick up to 2 random jobs
                    const selectedJobs = shuffled.slice(0, 2);

                    const buttonsContainer = document.getElementById('related-buttons');
                    buttonsContainer.innerHTML = ''; // Clear empty state

                    selectedJobs.forEach(job => {
                        buttonsContainer.innerHTML += `
                            <a href="career.html?id=${job.id}" class="related-btn">
                                ${job.title} <i data-lucide="arrow-right" style="width: 16px; margin-top: 1px;"></i>
                            </a>
                        `;
                    });

                    // Reveal the sticky bar
                    document.getElementById('related-careers-bar').style.display = 'flex';
                    lucide.createIcons();
                }
            } catch (err) {
                console.error("Error loading related careers:", err);
            }
        }

        loadJobDetails();

        // Native Share Logic
        document.getElementById('share-btn').addEventListener('click', async () => {
            const currentJobTitle = document.getElementById('job-title').innerText;
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: `SnapDollar | ${currentJobTitle}`,
                        text: `Check out the brutally honest truth about becoming a ${currentJobTitle}!`,
                        url: window.location.href
                    });
                } catch (err) {
                    console.log("Share cancelled.");
                }
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert("Link copied to clipboard!");
            }
        });
    </script>
</body>
</html>
