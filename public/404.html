
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapDollar | Map Your Success</title>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding: 0; }
        .hero { text-align: center; padding: 5rem 2rem 2rem 2rem; }
        .hero h1 { font-size: 3rem; margin-bottom: 0.5rem; color: #38bdf8; letter-spacing: -1px; }
        .hero p { font-size: 1.2rem; color: #94a3b8; margin-bottom: 2rem; }
        .search-container { margin: 0 auto 4rem auto; max-width: 600px; }
        input[type="text"] { width: 100%; padding: 1.2rem 1.5rem; border-radius: 50px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: #fff; font-size: 1.2rem; outline: none; box-shadow: 0 4px 30px rgba(0,0,0,0.5); transition: border-color 0.3s ease; }
        input[type="text"]:focus { border-color: #38bdf8; background: rgba(255,255,255,0.1); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; padding: 0 2rem 4rem 2rem; max-width: 1200px; margin: 0 auto; }
        .card { background: rgba(255,255,255,0.03); padding: 2.5rem 1.5rem; border-radius: 16px; text-align: center; border: 1px solid rgba(255,255,255,0.08); transition: all 0.3s ease; cursor: pointer; }
        .card:hover { transform: translateY(-8px); border-color: #38bdf8; background: rgba(255,255,255,0.08); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .card h3 { margin: 0; font-size: 1.3rem; font-weight: 600; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Discover Your Path. Map Your Success.</h1>
        <p>Explore every career in the universe.</p>
        <div class="search-container">
            <input type="text" placeholder="Search 'Software Engineer'...">
        </div>
    </div>
    <div class="grid">
        <div class="card"><h3>Technology & Data</h3></div>
        <div class="card"><h3>Business & Finance</h3></div>
        <div class="card"><h3>Healthcare & Medicine</h3></div>
        <div class="card"><h3>Engineering & Trades</h3></div>
        <div class="card"><h3>Creative & Media</h3></div>
        <div class="card"><h3>Science & Research</h3></div>
        <div class="card"><h3>Law & Public Service</h3></div>
    </div>
</body>
</html>
