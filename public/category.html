<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapDollar | Careers</title>
    <meta property="og:title" content="SnapDollar | Sector Explore">
    <meta property="og:description" content="Explore high-ROI careers in this sector.">
    <meta property="og:image" content="https://snapdollar.web.app/logo.png">
    <meta property="og:type" content="website">

    <link rel="icon" href="/logo.png" sizes="144x144" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg-obsidian: #050505;
            --card-bg: #111111;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --neon-emerald: #00ff88;
            --emerald-glow: rgba(0, 255, 136, 0.15);
        }

        body { 
            background-color: var(--bg-obsidian); 
            color: var(--text-main); 
            font-family: 'Inter', system-ui, sans-serif; 
            margin: 0; 
            padding: 0; 
        }

        h1, h2, h3, .logo { font-family: 'Space Grotesk', sans-serif; }

        /* Top Navigation */
        .navbar {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(5, 5, 5, 0.85); /* Semi-transparent dark background */
            backdrop-filter: blur(12px); /* The Apple-style glass effect */
        }
        .brand-container { 
            display: flex; 
            align-items: center; 
            gap: 0.75rem; 
            text-decoration: none !important; /* Forces the browser to never underline */
            color: inherit !important; /* Forces the text to stay white, never purple */
        }
        .custom-logo { height: 36px; width: auto; border-radius: 8px; }
        .logo { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; color: var(--text-main); }
        .logo span { color: var(--neon-emerald); }
        
        .back-btn {
            color: var(--text-muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
            transition: color 0.3s;
        }
        .back-btn:hover { color: var(--neon-emerald); }

        /* Header Section */
        .category-header { text-align: center; padding: 4rem 2rem 3rem 2rem; }
        .category-header h1 { font-size: 3rem; margin-bottom: 1rem; letter-spacing: -1px; }
        .category-header p { font-size: 1.2rem; color: var(--text-muted); max-width: 600px; margin: 0 auto; }

        /* Universal Search Bar (Ported from Homepage) */
        .search-container { 
            margin: 3rem auto 0 auto; 
            max-width: 600px; 
            position: relative;
        }
        input[type="text"] { 
            width: 100%; 
            padding: 1.2rem 1.5rem 1.2rem 3.5rem; 
            border-radius: 12px; 
            border: 1px solid #222; 
            background: var(--card-bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            font-size: 1.1rem; 
            outline: none; 
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        input[type="text"]:focus {
            border-color: var(--neon-emerald);
            box-shadow: 0 0 25px var(--emerald-glow);
        }
        .search-icon {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            width: 20px;
            height: 20px;
            transition: color 0.3s ease;
        }
        input[type="text"]:focus + .search-icon {
            color: var(--neon-emerald);
        }

        /* Job Cards Grid */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 1.5rem; 
            padding: 0 2rem 5rem 2rem; 
            max-width: 1100px; 
            margin: 0 auto; 
        }
        
        /* Loading Text */
        .loading { text-align: center; color: var(--neon-emerald); font-size: 1.2rem; width: 100%; grid-column: 1 / -1; }

        /* Make the entire card a clean clickable link */
        .card-link { text-decoration: none; color: inherit; display: block; }

        /* Individual Job Card Styles */
        .card { 
            background: var(--card-bg); 
            padding: 2rem; 
            border-radius: 12px; 
            border: 1px solid #222; 
            transition: all 0.3s ease; 
            height: 100%;
            box-sizing: border-box;
        }
        
        /* Apply the hover effect when the LINK is hovered */
        .card-link:hover .card { 
            transform: translateY(-4px); 
            border-color: var(--neon-emerald); 
            box-shadow: 0 10px 30px var(--emerald-glow);
        }
        
        .card-top {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .icon-wrapper {
            background: rgba(0, 255, 136, 0.1);
            color: var(--neon-emerald);
            padding: 0.8rem;
            border-radius: 8px;
            display: flex;
        }
        .card h3 { margin: 0; font-size: 1.4rem; }
        .card p { color: var(--text-muted); line-height: 1.6; margin-bottom: 1.5rem; font-size: 0.95rem; }
        
        /* Badges (Salary & ROI) */
        .badges { display: flex; gap: 0.8rem; flex-wrap: wrap; }
        .badge {
            padding: 0.4rem 0.8rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .badge-salary { background: rgba(0, 255, 136, 0.1); color: var(--neon-emerald); border: 1px solid rgba(0, 255, 136, 0.2); }
        .badge-roi { background: rgba(255, 255, 255, 0.05); color: #fff; border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* 🚨 AUTOCOMPLETE SEARCH DROPDOWN 🚨 */
        .suggestions-box {
            position: absolute;
            top: 110%; /* Attaches exactly below the input */
            left: 0;
            width: 100%;
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 9999;
            display: none; /* Hidden by default */
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            text-align: left; /* Overrides the center alignment from the header */
        }
        .suggestions-box.active {
            display: block;
        }
        .suggestion-item {
            padding: 12px 15px;
            color: #fff;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            transition: background 0.2s ease;
            font-size: 14px;
        }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:hover { background: rgba(255, 255, 255, 0.1); }
        .suggestion-highlight {
            color: var(--neon-emerald); /* Bright green highlight for matching letters */
            font-weight: bold;
        }
    </style>
</head>
<body>

     <nav class="navbar">
        <a href="index.html" class="brand-container">
            <img src="logo.png" alt="SnapDollar Logo" class="custom-logo" />
            <div class="logo">Snap<span>Dollar</span></div>
        </a>

        <button id="share-btn" class="back-btn" style="background: none; border: none; font-size: 1rem; cursor: pointer; padding: 0; font-family: inherit; color: var(--text-muted);">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="share-2" aria-hidden="true" style="width: 18px;" class="lucide lucide-share-2"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"></line><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"></line></svg> Share
        </button>
    </nav>


    <div class="category-header">
        <h1 id="page-title">Loading...</h1>
        <p id="page-desc">Fetching the best careers in the universe.</p>
        
        <div class="search-container">
            <input type="text" id="searchInput" autocomplete="off" placeholder="Search a career...">
            <i data-lucide="search" class="search-icon"></i>
            <div id="searchSuggestions" class="suggestions-box"></div>
        </div>
    </div>

    <div class="grid" id="jobs-container">
        <div class="loading">Booting up the database...</div>
    </div>

    <script>
        // Start Lucide icons for the static elements
        lucide.createIcons();

        // The function that fetches our data
        async function loadCareers() {
            try {
                // 1. Read the URL to see which category was clicked (defaults to 'tech' if empty)
                const urlParams = new URLSearchParams(window.location.search);
                const categoryId = urlParams.get('id') || 'tech';

                // 2. Fetch the dynamically selected JSON file
                const response = await fetch(`data/${categoryId}.json`);
                
                // If the file doesn't exist, trigger the error
                if (!response.ok) throw new Error("Database not found");
                
                const data = await response.json();

                // 3. Inject the Title and Description into the HTML
                document.getElementById('page-title').innerText = data.category;
                document.getElementById('page-desc').innerText = data.description;
                document.title = `SnapDollar | ${data.category}`;

                // 4. Grab the empty grid and clear out the "Loading..." text
                const container = document.getElementById('jobs-container');
                container.innerHTML = ''; 

                // 5. Loop through every job in the JSON and build a clickable card for it
                data.careers.forEach(job => {
                    const cardHTML = `
                        <a href="career.html?id=${job.id}" class="card-link">
                            <div class="card">
                                <div class="card-top">
                                    <div class="icon-wrapper"><i data-lucide="${job.icon}"></i></div>
                                    <h3>${job.title}</h3>
                                </div>
                                <p>${job.description}</p>
                                <div class="badges">
                                    <span class="badge badge-salary"><i data-lucide="banknote" style="width:14px;"></i> ${job.salaryRange}</span>
                                    <span class="badge badge-roi"><i data-lucide="zap" style="width:14px;"></i> ROI: ${job.roiRating}</span>
                                </div>
                            </div>
                        </a>
                    `;
                    // Inject the card into the grid
                    container.innerHTML += cardHTML;
                });

                // 6. Run the icon script again so the new icons actually show up
                lucide.createIcons();

            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('page-title').innerText = "Category Not Found";
                document.getElementById('page-desc').innerText = "We are still building this database sector. Check back soon.";
                document.getElementById('jobs-container').innerHTML = '';
            }
        }

        // Run the function the second the page loads
        loadCareers();
        
        // --- NATIVE SHARE LOGIC ---
        document.getElementById('share-btn').addEventListener('click', async () => {
            const categoryName = document.getElementById('page-title').innerText;
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: `SnapDollar | ${categoryName}`,
                        text: `Check out the best careers in ${categoryName} on SnapDollar!`,
                        url: window.location.href
                    });
                } catch (err) {
                    console.log("Share cancelled.");
                }
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert("Link copied to clipboard!");
            }
        });

        // 🚨 BULLETPROOF FRONTEND SEARCH ENGINE 🚨
        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('searchInput');
            const suggestionsBox = document.getElementById('searchSuggestions');
            if (!searchInput || !suggestionsBox) return;

            let masterIndex = [];
            let isLoaded = false;

            // 1. Fetch and merge all categories into memory instantly
            async function buildSearchIndex() {
                try {
                    const categories = ['tech', 'finance', 'medical', 'engineer', 'science', 'creative', 'publicservice'];
                    // We use relative path to ensure Firebase finds it perfectly
                    const promises = categories.map(cat => fetch(`data/${cat}.json`).then(res => res.ok ? res.json() : null).catch(() => null));
                    const results = await Promise.all(promises);
                    
                    // Merge all arrays
                    results.forEach(data => {
                        if (data && data.careers) {
                            masterIndex = masterIndex.concat(data.careers.map(c => ({ id: c.id, title: c.title })));
                        }
                    });
                    isLoaded = true;
                } catch (err) {
                    console.warn("Search index warning:", err); // Logs a warning without crashing
                }
            }

            buildSearchIndex();

            // 2. Listen to user keystrokes
            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.trim();
                suggestionsBox.innerHTML = ''; // Clear previous
                
                if (query.length === 0 || !isLoaded) {
                    suggestionsBox.classList.remove('active');
                    return;
                }

                // Escape regex to prevent crashes
                const safeQuery = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                
                // 3. Match if query is at the START of ANY word (e.g., "Rep" finds "Sales Rep")
                const regex = new RegExp(`\\b${safeQuery}`, 'i');
                const matches = masterIndex.filter(career => regex.test(career.title)).slice(0, 6);

                // 4. Render Dropdown
                if (matches.length > 0) {
                    matches.forEach(match => {
                        const div = document.createElement('div');
                        div.className = 'suggestion-item';
                        
                        // Bold the exact letters they typed
                        const highlightRegex = new RegExp(`\\b(${safeQuery})`, 'gi');
                        const highlightedTitle = match.title.replace(highlightRegex, '<span class="suggestion-highlight">$1</span>');
                        
                        div.innerHTML = `🔍 &nbsp; ${highlightedTitle}`;
                        div.onclick = () => window.location.href = `career.html?id=${match.id}`;
                        suggestionsBox.appendChild(div);
                    });
                    suggestionsBox.classList.add('active');
                } else {
                    suggestionsBox.classList.remove('active');
                }
            });

            // 5. Hide when clicking somewhere else
            document.addEventListener('click', (e) => {
                if (!searchInput.contains(e.target) && !suggestionsBox.contains(e.target)) {
                    suggestionsBox.classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>
