name: Weekly AI Ghostwriter

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  generate_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: |
          npm install
          npm install -g firebase-tools

      - name: Run Ghostwriter AI
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node ghostwriter.js

      - name: Commit New Career to GitHub
        run: |
          git config --global user.name "SnapDollar-AI"
          git config --global user.email "ai@snapdollar.com"
          git add public/data/ backlog.json public/sitemap.xml
          git commit -m "🤖 AI automatically added a new career database" || echo "No changes to commit"
          git push origin HEAD:main
          
      - name: Deploy to Firebase Live
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SNAPDOLLAR }}
          channelId: live
          projectId: snapdollar
